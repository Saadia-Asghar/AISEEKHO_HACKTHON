<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        @import url('https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap');
        
        body {
            font-family: 'Geist', sans-serif;
            background-color: #09090B;
            margin: 0;
            padding: 0;
            overflow: hidden;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .pulse-glow {
            animation: pulse-glow 3s ease-in-out infinite;
        }

        @keyframes pulse-glow {
            0%, 100% {
                filter: drop-shadow(0 0 15px rgba(210, 187, 255, 0.3));
                transform: scale(1);
            }
            50% {
                filter: drop-shadow(0 0 35px rgba(210, 187, 255, 0.6));
                transform: scale(1.05);
            }
        }

        .shimmer-circle {
            background: conic-gradient(from 0deg, transparent 0%, #d2bbff 50%, transparent 100%);
            animation: rotate 2s linear infinite;
            mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0);
            -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), #000 0);
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .mesh-gradient-bg {
            background: radial-gradient(circle at 50% 50%, rgba(124, 58, 237, 0.15) 0%, transparent 70%);
        }

        .shimmer-progress {
            background: linear-gradient(90deg, #7c3aed 0%, #d2bbff 50%, #7c3aed 100%);
            background-size: 200% 100%;
            animation: shimmer-move 2s linear infinite;
        }

        @keyframes shimmer-move {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-bright": "#39393b",
                        "secondary-container": "#ec6a06",
                        "background": "#131315",
                        "tertiary-fixed-dim": "#4edea3",
                        "error": "#ffb4ab",
                        "surface-dim": "#131315",
                        "tertiary-container": "#007650",
                        "surface-tint": "#d2bbff",
                        "on-primary-fixed-variant": "#5a00c6",
                        "surface-variant": "#353437",
                        "on-secondary-fixed-variant": "#783200",
                        "on-primary": "#3f008e",
                        "on-primary-container": "#ede0ff",
                        "secondary": "#ffb690",
                        "on-tertiary-fixed": "#002113",
                        "surface-container-lowest": "#0e0e10",
                        "inverse-surface": "#e5e1e4",
                        "error-container": "#93000a",
                        "surface-container-high": "#2a2a2c",
                        "secondary-fixed-dim": "#ffb690",
                        "on-surface": "#e5e1e4",
                        "on-background": "#e5e1e4",
                        "tertiary": "#4edea3",
                        "outline-variant": "#4a4455",
                        "on-primary-fixed": "#25005a",
                        "surface-container-low": "#1c1b1d",
                        "surface-container-highest": "#353437",
                        "primary-fixed-dim": "#d2bbff",
                        "outline": "#958da1",
                        "on-surface-variant": "#ccc3d8",
                        "primary": "#d2bbff",
                        "on-secondary": "#552100",
                        "surface": "#131315",
                        "on-tertiary": "#003824",
                        "on-secondary-fixed": "#341100",
                        "surface-container": "#201f22",
                        "inverse-on-surface": "#313032",
                        "primary-fixed": "#eaddff",
                        "on-tertiary-fixed-variant": "#005236",
                        "on-error-container": "#ffdad6",
                        "on-error": "#690005",
                        "primary-container": "#7c3aed",
                        "tertiary-fixed": "#6ffbbe",
                        "on-secondary-container": "#4a1c00",
                        "secondary-fixed": "#ffdbca",
                        "on-tertiary-container": "#76ffc2",
                        "inverse-primary": "#732ee4"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "16px",
                        "stack-md": "16px",
                        "stack-sm": "8px",
                        "stack-lg": "24px",
                        "container-padding": "20px",
                        "base": "4px"
                    },
                    "fontFamily": {
                        "headline-md": ["Geist"],
                        "headline-lg": ["Geist"],
                        "body-md": ["Geist"],
                        "label-sm": ["Geist"],
                        "label-md": ["Geist"],
                        "display": ["Geist"],
                        "body-lg": ["Geist"]
                    },
                    "fontSize": {
                        "headline-md": ["24px", { "lineHeight": "32px", "fontWeight": "600" }],
                        "headline-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-md": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600" }],
                        "label-md": ["14px", { "lineHeight": "20px", "letterSpacing": "0.01em", "fontWeight": "500" }],
                        "display": ["40px", { "lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-lg": ["18px", { "lineHeight": "28px", "fontWeight": "400" }]
                    }
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-[#09090B] flex flex-col min-h-screen text-on-surface">
<!-- Top App Bar -->
<header class="fixed top-0 w-full z-50 bg-background/80 backdrop-blur-md flex items-center justify-between px-container-padding h-16">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary hover:opacity-80 transition-opacity active:scale-95 transition-transform" data-icon="arrow_back">arrow_back</span>
</div>
<h1 class="font-display text-display text-primary dark:text-primary !text-[24px]">KhidmatAI</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- Main Canvas: Loading Screen Content -->
<main class="flex-grow flex flex-col items-center justify-center px-container-padding mesh-gradient-bg">
<!-- Central Element: Mic and Shimmer -->
<div class="relative w-48 h-48 flex items-center justify-center">
<!-- Pulsing Ambient Glow -->
<div class="absolute inset-0 bg-primary/20 blur-[60px] rounded-full pulse-glow"></div>
<!-- Rotating Shimmer Border -->
<div class="absolute inset-0 shimmer-circle rounded-full p-1"></div>
<!-- Central Mic Icon -->
<div class="relative w-32 h-32 bg-primary-container rounded-full flex items-center justify-center shadow-[0_0_30px_rgba(124,58,237,0.4)] transition-transform active:scale-90">
<span class="material-symbols-outlined text-on-primary-container text-[64px]" data-icon="mic" data-weight="fill" style="font-variation-settings: 'FILL' 1;">mic</span>
</div>
</div>
<!-- Progress and Text -->
<div class="mt-12 w-full max-w-[300px] flex flex-col items-center space-y-6">
<div class="text-center space-y-2">
<h2 class="font-headline-md text-headline-md text-on-surface transition-opacity duration-500" id="loading-text">AI agents are finding your perfect match...</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Scanning 1,400+ verified professionals</p>
</div>
<!-- Custom Progress Bar -->
<div class="w-full h-1.5 bg-surface-variant rounded-full overflow-hidden">
<div class="h-full shimmer-progress w-0 transition-[width] duration-300 ease-out" id="progress-bar"></div>
</div>
<div class="flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-tertiary animate-pulse"></span>
<span class="font-label-sm text-label-sm text-tertiary uppercase tracking-widest">Optimizing results</span>
</div>
</div>
</main>
<!-- Footer -->
<footer class="w-full mb-24 flex justify-center items-center py-4 bg-transparent">
<span class="font-label-sm text-label-sm text-on-surface-variant">Powered by Google</span>
</footer>
<!-- Bottom Navigation Bar -->
<nav class="fixed bottom-0 w-full z-50 rounded-t-xl bg-surface-container/80 dark:bg-surface-container/80 backdrop-blur-xl border-t border-outline-variant shadow-lg flex justify-around items-center h-20 px-4 pb-safe">
<div class="flex flex-col items-center text-primary border-b-2 border-primary pb-1 hover:text-primary transition-colors active:scale-90 transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="home" data-weight="fill" style="font-variation-settings: 'FILL' 1;">home</span>
<span class="font-label-sm text-label-sm">Home</span>
</div>
<div class="flex flex-col items-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
<span class="font-label-sm text-label-sm">Bookings</span>
</div>
<div class="flex flex-col items-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="location_searching">location_searching</span>
<span class="font-label-sm text-label-sm">Trace</span>
</div>
<div class="flex flex-col items-center text-on-surface-variant hover:text-primary transition-colors active:scale-90 transition-transform cursor-pointer">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-label-sm text-label-sm">Profile</span>
</div>
</nav>
<script>
        // Micro-interaction: Progress Bar Simulation
        const bar = document.getElementById('progress-bar');
        const text = document.getElementById('loading-text');
        const messages = [
            "AI agents are finding your perfect match...",
            "Connecting you with top pros...",
            "Analyzing service history...",
            "Securing the best rates for you...",
            "Finalizing agent connection..."
        ];
        
        let progress = 0;
        let messageIndex = 0;

        function updateLoading() {
            if (progress < 100) {
                progress += Math.random() * 8;
                if (progress > 100) progress = 100;
                bar.style.width = `${progress}%`;

                // Periodically update text
                if (progress > (messageIndex + 1) * 20 && messageIndex < messages.length - 1) {
                    messageIndex++;
                    text.style.opacity = 0;
                    setTimeout(() => {
                        text.innerText = messages[messageIndex];
                        text.style.opacity = 1;
                    }, 500);
                }
                
                setTimeout(updateLoading, 400 + Math.random() * 600);
            }
        }

        updateLoading();

        // Subtle parallax effect on the central icon
        document.addEventListener('mousemove', (e) => {
            const mic = document.querySelector('.bg-primary-container');
            const x = (window.innerWidth / 2 - e.pageX) / 40;
            const y = (window.innerHeight / 2 - e.pageY) / 40;
            mic.style.transform = `translate(${x}px, ${y}px)`;
        });
    </script>
</body></html>
