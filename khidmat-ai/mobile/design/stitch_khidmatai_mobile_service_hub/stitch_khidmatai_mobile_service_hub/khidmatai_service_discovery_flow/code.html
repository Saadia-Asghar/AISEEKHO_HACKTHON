<body class="flex items-center justify-center min-h-screen p-container-padding">
<!-- Screen Container (390px Mobile Context) -->
<main class="w-full max-w-[390px] mx-auto min-h-[844px] flex flex-col justify-between relative">
<!-- Background Decoration -->
<div class="fixed top-[-10%] left-[-20%] w-[80%] h-[40%] bg-primary-container/10 blur-[120px] -z-10 rounded-full"></div>
<div class="fixed bottom-[-5%] right-[-10%] w-[60%] h-[30%] bg-secondary-container/5 blur-[100px] -z-10 rounded-full"></div>
<!-- Top Header Area (Shared Component Context) -->
<header class="fixed top-0 left-0 w-full z-50 bg-background/80 backdrop-blur-md px-container-padding h-16 flex items-center justify-between">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary cursor-pointer active:scale-95 transition-transform">arrow_back</span>
<h1 class="font-display text-headline-md text-primary tracking-tight">KhidmatAI</h1>
</div>
</header>
<!-- Main Content -->
<div class="mt-24 px-4 flex-grow flex flex-col items-center justify-center">
<!-- Branding Section -->
<div class="text-center mb-stack-lg">
<div class="w-20 h-20 mx-auto bg-primary-container rounded-3xl flex items-center justify-center ai-glow mb-stack-md relative overflow-hidden group">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<span class="material-symbols-outlined text-on-primary-container text-[40px]" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
</div>
<h2 class="font-headline-lg text-headline-lg text-on-surface mb-base">Welcome Back</h2>
<p class="font-body-md text-on-surface-variant opacity-80">Premium service execution at your command.</p>
</div>
<!-- Phone Input View (Initial State) -->
<div class="w-full glass-card rounded-[24px] p-stack-lg space-y-stack-md transition-all duration-500 transform" id="phone-view">
<div class="space-y-base">
<label class="font-label-sm text-on-surface-variant uppercase tracking-wider ml-1">Phone Number</label>
<div class="relative flex items-center">
<div class="absolute left-4 font-body-md text-primary font-bold">+92</div>
<input class="w-full bg-[#09090B] border border-outline-variant rounded-xl py-4 pl-14 pr-4 font-body-md text-on-surface focus:outline-none focus:border-primary-container transition-all" maxlength="10" placeholder="300 0000000" type="tel"/>
</div>
</div>
<button class="w-full bg-primary-container text-on-primary-container font-headline-md py-4 rounded-xl active:scale-95 transition-transform ai-glow hover:opacity-90 flex items-center justify-center gap-2" onclick="transitionToOTP()">
                    Send OTP
                    <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-center font-label-sm text-on-surface-variant">
                    By continuing, you agree to our <span class="text-primary underline cursor-pointer">Terms of Service</span>.
                </p>
</div>
<!-- OTP Input View (Secondary State - Hidden by default) -->
<div class="hidden w-full glass-card rounded-[24px] p-stack-lg space-y-stack-lg transition-all duration-500 transform translate-y-8 opacity-0" id="otp-view">
<div class="text-center space-y-base">

<input class="otp-input w-14 h-16 bg-[#09090B] border border-outline-variant rounded-xl text-center text-headline-md text-primary font-bold focus:outline-none transition-all" maxlength="1" type="text" value="2"/>
<input class="otp-input w-14 h-16 bg-[#09090B] border border-outline-variant rounded-xl text-center text-headline-md text-primary font-bold focus:outline-none transition-all" maxlength="1" type="text" value="3"/>
<input class="otp-input w-14 h-16 bg-[#09090B] border border-outline-variant rounded-xl text-center text-headline-md text-primary font-bold focus:outline-none transition-all" maxlength="1" type="text" value="4"/>
</div>
<div class="bg-surface-container-high/50 p-stack-sm rounded-lg flex items-center justify-center gap-2 border border-outline-variant/30">

<div class="space-y-stack-sm">

<div class="absolute inset-0 bg-gradient-to-t from-[#09090B] via-transparent to-transparent"></div>
</div>
</div>

<footer class="w-full mb-8 flex justify-center items-center py-4">
<p class="font-label-sm text-on-surface-variant text-label-sm opacity-60">Powered by Google</p>
</footer>
</main>
<script>
        function transitionToOTP() {
            const phoneView = document.getElementById('phone-view');
            const otpView = document.getElementById('otp-view');

            phoneView.classList.add('opacity-0', '-translate-y-8');
            setTimeout(() => {
                phoneView.classList.add('hidden');
                otpView.classList.remove('hidden');
                // Trigger animation
                requestAnimationFrame(() => {
                    otpView.classList.remove('opacity-0', 'translate-y-8');
                    otpView.classList.add('opacity-100', 'translate-y-0');
                });
            }, 300);
        }

        function backToPhone() {
            const phoneView = document.getElementById('phone-view');
            const otpView = document.getElementById('otp-view');

            otpView.classList.add('opacity-0', 'translate-y-8');
            setTimeout(() => {
                otpView.classList.add('hidden');
                phoneView.classList.remove('hidden');
                requestAnimationFrame(() => {
                    phoneView.classList.remove('opacity-0', '-translate-y-8');
                    phoneView.classList.add('opacity-100', 'translate-y-0');
                });
            }, 300);
        }

        // Auto-focus logic for OTP inputs
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
